receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:${env:OTEL_COLLECTOR_GRPC_PORT:-4317}"
      http:
        endpoint: "0.0.0.0:${env:OTEL_COLLECTOR_HTTP_PORT:-4318}"

  prometheus:
    config:
      scrape_configs:
        - job_name: 'pi-mono-compute'
          scrape_interval: 10s
          static_configs:
            - targets: ['127.0.0.1:18080', '127.0.0.1:18081']

  filelog:
    include: [/var/lib/docker/containers/*/*.log]
    operators:
      - type: json_parser # parses the log line as JSON
        timestamp:
          parse_from: attributes.time
          layout: '%Y-%m-%dT%H:%M:%S.%LZ'
      - type: move # rename fields to match OpenObserve expectations if needed
        from: attributes.log
        to: body
    # Extract container ID from the path for metadata enrichment
    include_file_path: true

processors:
  batch:
  resourcedetection:
    detectors: [system]

exporters:
  otlp_http/openobserve:
    endpoint: "http://127.0.0.1:5080/api/default"
    headers:
      Authorization: "${env:OPENOBSERVE_AUTH_HEADER}"

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resourcedetection]
      exporters: [otlp_http/openobserve]
    metrics:
      receivers: [otlp, prometheus]
      processors: [batch, resourcedetection]
      exporters: [otlp_http/openobserve]
    logs:
      receivers: [otlp, filelog]
      processors: [batch, resourcedetection]
      exporters: [otlp_http/openobserve]
