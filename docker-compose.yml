name: pi-mono-stack

include:
  - path: memory/docker-compose.yml
  - path: gateway/docker-compose.yml
  - path: dkron/docker-compose.yml
  - path: pi-mono/docker-compose.yml
  - path: browser-use/docker-compose.yml
  - path: tavily/docker-compose.yml
  - path: swe/docker-compose.yml
  - path: wikipedia/docker-compose.yml
  - path: twitter/docker-compose.yml
  - path: irm/docker-compose.yml

services:
  redis:
    image: falkordb/falkordb:edge-alpine
    container_name: redis
    environment:
      - PORT=13000
      - REDIS_ARGS=--appendonly yes --dir /var/lib/falkordb/data
    volumes:
      - redis_data:/var/lib/falkordb/data
    restart: unless-stopped
    network_mode: host

  litellm:
    image: ghcr.io/berriai/litellm:main-v1.81.9-nightly
    container_name: litellm
    environment:
      - GEMINI_API_KEY
      - OPENROUTER_API_KEY
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://127.0.0.1:4318/v1/traces
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_SERVICE_NAME=pi-mono-litellm
    volumes:
      - ${BASE_CONFIG_PATH}/.pi/agent/litellm.config.yaml:/app/config.yaml
    command: "--config /app/config.yaml"
    network_mode: host

  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-server
    volumes:
      - ${BASE_CONFIG_PATH}/.pi/agent/workspace/.swe/download:/models
    command: >
      -m /models/Qwen3.5-9B-Q5_K_M.gguf
      --port 18080
      --host 0.0.0.0
      -c 262114
      -np 1
      --flash-attn on
      --n-gpu-layers 99
      --cache-type-k q8_0
      --cache-type-v q8_0
      --metrics
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    network_mode: host
    restart: unless-stopped

  llama-embedding:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-embedding
    volumes:
      - ${BASE_CONFIG_PATH}/.pi/agent/workspace/.swe/download:/models
    command: >
      -m /models/qwen3_embedding_4b_q8_0/unsloth.Q8_0.gguf
      --port 18081
      --host 0.0.0.0
      --embedding
      --pooling mean
      -c 512
      -np 1
      --n-gpu-layers 99
      --metrics
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    network_mode: host

  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    container_name: openobserve
    environment:
      - ZO_ROOT_USER_EMAIL=${OPENOBSERVE_ADMIN_ACCOUNT}
      - ZO_ROOT_USER_PASSWORD=${OPENOBSERVE_ROOT_PASSWORD}
      - ZO_DATA_DIR=/data
      - ZO_HTTP_PORT=5080
    volumes:
      - openobserve_data:/data
    network_mode: host
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    environment:
      - OPENOBSERVE_AUTH_HEADER=${OPENOBSERVE_AUTH_HEADER}
      - OTEL_COLLECTOR_GRPC_PORT=4317
      - OTEL_COLLECTOR_HTTP_PORT=4318
    volumes:
      - ${BASE_CONFIG_PATH}/.pi/agent/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    network_mode: host
    restart: unless-stopped
    depends_on:
      - openobserve

volumes:
  redis_data:
  openobserve_data: