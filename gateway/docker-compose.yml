services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: gateway
    depends_on:
      redis:
        condition: service_started
      dkron:
        condition: service_healthy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ${BASE_CONFIG_PATH}/.pi/agent/workspace:/home/pi-mono/.pi/agent/workspace:rw
    environment:
      - TELEGRAM_TOKEN
      - REDIS_URL=redis://127.0.0.1:6379
      - TG_ADMIN_ID=7722403902
      - DKRON_URL=http://127.0.0.1:18047/v1
      - LLAMA_SERVER_URL=http://127.0.0.1:18080/v1
      - WEB_PORT=48329
