services:
  memory:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: memory
    environment:
      - REDIS_URL=redis://127.0.0.1:6379
      - LLAMA_SERVER_URL=http://127.0.0.1:18080/v1
      - LLAMA_EMBEDDING_URL=http://127.0.0.1:18081/v1
      - MEM_API_PORT=18090
    volumes:
      - ${BASE_CONFIG_PATH}/.pi/agent/workspace/.memory:/data
    network_mode: host
    restart: unless-stopped
    depends_on:
      - redis
      - llama-server
      - llama-embedding
