services:
  dkron:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: dkron
    environment:
      - DKRON_HTTP_ADDR=:18047
      - DKRON_URL=http://127.0.0.1:18047/v1
      - REDIS_URL=redis://127.0.0.1:6379
    volumes:
      - ${BASE_CONFIG_PATH}/.pi/agent/workspace/.dkron:/dkron.data:rw
      - /var/run/docker.sock:/var/run/docker.sock
    network_mode: host
    restart: unless-stopped
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:18047/v1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
